<!DOCTYPE html>
<html>
<head>

<title>AI Code Debugger</title>
<link rel="stylesheet" href="style.css">

<script src="https://unpkg.com/monaco-editor@0.44.0/min/vs/loader.js"></script>

</head>

<body>

<div class="container">

<div class="sidebar">

<h3>Repository Files</h3>
<div id="fileExplorer"></div>

</div>


<div class="editor-section">

<h1>AI Code Debugger</h1>

<div id="editor"></div>

<div class="buttons">

<button onclick="analyzeCode()">Analyze</button>
<button onclick="explainCode()">Explain</button>
<button onclick="autoFix()">Auto Fix</button>
<button onclick="optimizeCode()">Optimize Code</button>

<input type="file" id="fileInput">
<button onclick="uploadFile()">Upload File</button>

<button onclick="analyzeRepo()">Analyze GitHub Repo</button>

</div>

<pre id="result"></pre>

</div>

</div>


<script src="script.js"></script>

<script>

var editor;

require.config({paths:{'vs':'https://unpkg.com/monaco-editor@0.44.0/min/vs'}})

require(['vs/editor/editor.main'],function(){

editor=monaco.editor.create(document.getElementById('editor'),{

value:`print("Hello AI Debugger")`,
language:"python",
theme:"vs-dark",
automaticLayout:true

})

})

</script>

</body>
</html>
